name: emergency_meds
description: VialCheck – Offline-First App zur Verwaltung von Notfallmedikamenten.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Lokale Datenbank
  sqflite: ^2.3.3+1
  path_provider: ^2.1.3
  path: ^1.9.0

  # Barcode / DataMatrix Scanner
  mobile_scanner: ^6.0.2

  # Foto & Texterkennung (Ampullen ohne Barcode)
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.14.0
  uuid: ^4.5.1

  # Datumsformatierung & Lokalisierung
  intl: ^0.19.0

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
